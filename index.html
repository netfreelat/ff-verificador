<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificación de ID - Free Fire</title>
    <meta name="description" content="Verifica tu ID de jugador de Free Fire y obtén tu nombre de usuario al instante.">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="main-container">
        <div class="card">
            <div class="logo-container">
                <h1>FREE FIRE</h1>
                <p>CENTRO DE VERIFICACIÓN</p>
            </div>

            <div class="input-group">
                <input type="text" id="player-id" placeholder="Ingresa ID del Jugador" autocomplete="off">
            </div>

            <button id="verify-btn" class="btn-primary">
                <i class="fa-solid fa-magnifying-glass"></i> Consultar ID
            </button>

            <div class="footer-text">
                <p>Compatible con todas las regiones de Free Fire</p>
                <p style="margin-top: 10px;">Desarrollado con ❤️ para la comunidad</p>
            </div>
        </div>
    </div>

    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
