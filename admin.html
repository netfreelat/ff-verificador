<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo | Almacén de Pines</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #9D00FF;
            --primary-hover: #7B00CC;
            --secondary: #00F0FF;
            --dark: #0A0512;
            --dark-card: rgba(20, 10, 35, 0.95);
            --text: #ffffff;
            --text-gray: #aaa;
            --success: #25D366;
            --danger: #ff4b2b;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(157, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 240, 255, 0.1) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .admin-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--dark-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.1);
        }

        .stat-card .amount {
            font-size: 0.8rem;
            color: var(--text-gray);
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .stat-card .count {
            font-size: 1.8rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: var(--secondary);
        }

        .stat-card .count.empty {
            color: var(--danger);
        }

        .action-card {
            background: var(--dark-card);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(157, 0, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .action-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-gray);
        }

        select, textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
        }

        select:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(0,0,0,0.5);
        }

        textarea {
            height: 150px;
            resize: none;
            font-family: monospace;
        }

        .btn-add {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(157, 0, 255, 0.4);
        }

        .btn-add:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(157, 0, 255, 0.6);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-link:hover { color: white; }

        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <div class="header">
            <h1>ALMACÉN DE PINES</h1>
            <p>Gestiona tus códigos de Free Fire de forma eficiente</p>
        </div>

        <!-- Stock de Pines -->
        <div class="stats-grid" id="stats-container">
            <!-- Cargado por JS -->
        </div>

        <!-- Agregar Pines -->
        <div class="action-card">
            <h2><i class="fa-solid fa-plus-circle" style="color: var(--primary);"></i> Agregar Nuevos Pines</h2>
            
            <div class="form-group">
                <label>Selecciona el paquete:</label>
                <select id="pin-amount">
                    <option value="100">100 + 10 Diamantes</option>
                    <option value="310">310 + 31 Diamantes</option>
                    <option value="520">520 + 52 Diamantes</option>
                    <option value="1060">1060 + 106 Diamantes</option>
                    <option value="2180">2180 + 218 Diamantes</option>
                    <option value="5600">5600 + 560 Diamantes</option>
                </select>
            </div>

            <div class="form-group">
                <label>Pega los códigos aquí (uno por línea):</label>
                <textarea id="pin-codes" placeholder="CÓDIGO1&#10;CÓDIGO2&#10;CÓDIGO3"></textarea>
            </div>

            <button id="add-btn" class="btn-add">
                <i class="fa-solid fa-cloud-arrow-up"></i> Cargar Pines al Almacén
            </button>
        </div>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver a la Tienda</a>
    </div>

    <script>
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || !window.location.hostname;
        const SERVER_URL = window.location.hostname.includes('loca.lt') ? window.location.origin : (isLocal ? 'http://localhost:3500' : 'https://ff-verificador.onrender.com');

        async function loadStats() {
            try {
                const res = await fetch(`${SERVER_URL}/admin/pines`);
                const pines = await res.json();
                const container = document.getElementById('stats-container');
                container.innerHTML = '';

                Object.keys(pines).forEach(amount => {
                    const count = pines[amount].length;
                    const card = document.createElement('div');
                    card.className = 'stat-card';
                    card.innerHTML = `
                        <span class="amount">${amount} 💎</span>
                        <span class="count ${count === 0 ? 'empty' : ''}">${count}</span>
                        <p style="font-size: 0.7rem; color: #666; margin-top: 5px;">Disponibles</p>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                console.error('Error cargando estadísticas:', e);
            }
        }

        document.getElementById('add-btn').addEventListener('click', async () => {
            const amount = document.getElementById('pin-amount').value;
            const textarea = document.getElementById('pin-codes');
            const codes = textarea.value.split('\n').map(c => c.trim()).filter(c => c.length > 0);

            if (codes.length === 0) {
                Swal.fire({ icon: 'warning', title: 'Sin datos', text: 'Por favor, ingresa al menos un código.' });
                return;
            }

            Swal.fire({ title: 'Cargando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${SERVER_URL}/admin/pines/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, codes })
                });

                const result = await res.json();
                if (result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: '¡Pines Agregados!',
                        text: `Se cargaron ${codes.length} nuevos pines correctamente.`,
                        confirmButtonColor: '#9D00FF'
                    });
                    textarea.value = '';
                    loadStats();
                } else {
                    throw new Error(result.error);
                }
            } catch (e) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudieron cargar los pines.' });
            }
        });

        loadStats();
    </script>
</body>
</html>
